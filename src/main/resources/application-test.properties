# ========================================
# TEST PROFILE CONFIGURATION
# ========================================
# Activated with: --spring.profiles.active=test
# For unit and integration tests
# ========================================

# Use H2 in-memory database for tests (no PostgreSQL needed)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional for debugging tests)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA - Create and drop schema for each test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Logging - Debug for tests (but minimal output)
logging.level.com.simhadri.aidocqa=DEBUG
logging.level.org.springframework.test=INFO
logging.level.org.hibernate.SQL=WARN

# Chunking - Very small for fast tests
chunking.size=200
chunking.overlap=50
chunking.similarity-threshold=0.5
chunking.min-chunk-size=20

# RAG - Minimal for tests
rag.max-chunks-to-retrieve=2
rag.similarity-threshold=0.5
rag.context-max-length=1000

# OpenAI - Mock this in tests (use test key)
openai.api.key=test-key-do-not-use-in-production
openai.model=gpt-3.5-turbo
openai.temperature=0
openai.max-tokens=100

# Embedding - Mock for tests
openai.embedding.model=text-embedding-ada-002
openai.embedding.max-tokens=1000

# Disable all caching in tests
spring.cache.type=none

# File upload - Very small limits for tests
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB
file.upload.temp-dir=./temp-files-test

# Server - Random port for tests to avoid conflicts
server.port=0

# Test specific
app.debug=true
test.enabled=true

# CORS - Allow all for tests
cors.allowed-origins=*

# Async - Synchronous for tests (easier debugging)
async.core-pool-size=1
async.max-pool-size=1
async.queue-capacity=0

# Actuator - Disable for tests
management.endpoints.web.exposure.include=

# Timeouts - Short for tests
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=5000

# Mock external services
com.simhadri.aidocqa.mock-openai=true
com.simhadri.aidocqa.mock-whisper=true