# ========================================
# DEVELOPMENT PROFILE CONFIGURATION
# ========================================
# Activated with: --spring.profiles.active=dev
# For local development and testing
# ========================================

# Database Configuration (Development Database)
spring.datasource.url=jdbc:postgresql://localhost:5432/aidocqa_dev
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool - Smaller for development
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JPA - Show full SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging - Debug level for development
logging.level.com.simhadri.aidocqa=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Console logging with colors
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %highlight(%-5level) - %cyan(%msg%n)

# Chunking - Smaller for faster testing
chunking.size=500
chunking.overlap=100
chunking.similarity-threshold=0.6
chunking.min-chunk-size=50

# RAG Configuration
rag.max-chunks-to-retrieve=3
rag.similarity-threshold=0.6
rag.context-max-length=2000

# OpenAI - Lower temperature for consistent responses
openai.temperature=0.5
openai.max-tokens=500

# Embedding Configuration
openai.embedding.max-tokens=4000
openai.embedding.cache-size=100

# Disable caching in development
spring.cache.type=none

# File upload - Smaller limits for testing
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server - Different port to avoid conflicts
server.port=8081

# Development specific
app.debug=true
server.error.include-stacktrace=always

# CORS - Allow all origins in dev
cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002

# Async - Smaller pool for dev
async.core-pool-size=2
async.max-pool-size=5
async.queue-capacity=20

# Actuator - Full details in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.loggers.enabled=true

# Temp directory for dev
file.upload.temp-dir=./temp-files-dev