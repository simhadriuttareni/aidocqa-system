# ========================================
# PRODUCTION PROFILE CONFIGURATION
# ========================================
# Activated with: --spring.profiles.active=prod
# For production deployment
# ========================================

# Database Configuration (Use environment variables for security)
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/aidocqa}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool - Optimized for production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA - Disable SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging - Only WARN and ERROR in production
logging.level.root=WARN
logging.level.com.simhadri.aidocqa=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=ERROR

# File logging with rotation
logging.file.name=/var/log/aidocqa/application.log
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=30

# Chunking - Optimized for production
chunking.size=1500
chunking.overlap=300
chunking.similarity-threshold=0.75
chunking.min-chunk-size=100
chunking.max-chunks-per-document=5000

# RAG Configuration
rag.max-chunks-to-retrieve=5
rag.similarity-threshold=0.75
rag.context-max-length=4000
rag.enable-source-tracking=true

# OpenAI - Production settings
openai.temperature=0.7
openai.max-tokens=1000
openai.timeout.connect=30
openai.timeout.read=60

# Embedding Configuration
openai.embedding.max-tokens=8000
openai.embedding.batch-size=20
openai.embedding.cache-size=10000
openai.embedding.similarity-threshold=0.7

# Enable caching in production
spring.cache.type=simple
spring.cache.simple.expiration=7200000

# File upload - Production limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
file.upload.temp-dir=/tmp/aidocqa-uploads

# Server - Production configuration
server.port=8080
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.connection-timeout=30000
server.error.include-stacktrace=never
server.error.include-message=never

# Security - Production settings
app.debug=false
spring.security.enabled=true

# CORS - Restrict in production
cors.allowed-origins=${CORS_ORIGINS:https://yourdomain.com}
cors.allowed-methods=GET,POST
cors.allow-credentials=true
cors.max-age=3600

# Actuator - Limited exposure in production
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Async - Production pool
async.core-pool-size=5
async.max-pool-size=20
async.queue-capacity=100
async.await-termination-seconds=60

# Health check
management.health.db.enabled=true
management.health.diskspace.enabled=true