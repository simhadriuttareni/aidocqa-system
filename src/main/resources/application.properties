# ========================================
# Database Configuration
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/aidocqa
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================================
# JPA / Hibernate Configuration
# ========================================
# IMPORTANT: Use 'create-drop' to recreate tables with correct schema
# Then change back to 'update' after tables are created
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ========================================
# OpenAI Configuration
# ========================================
# API Configuration
openai.api.key=${OPENAI_API_KEY:YOUR_OPENAI_API_KEY_HERE}

# Chat Completions
openai.model=gpt-3.5-turbo
openai.max-tokens=1000
openai.temperature=0.7

# Embeddings
openai.embedding.model=text-embedding-ada-002
openai.embedding.max-tokens=8000
openai.embedding.batch-size=20
openai.embedding.cache-size=1000
openai.embedding.similarity-threshold=0.7

# Timeouts
openai.timeout.connect=30
openai.timeout.read=60

# ========================================
# File Upload Configuration
# ========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2MB
spring.servlet.multipart.resolve-lazily=false

# Custom file storage
file.upload.temp-dir=./temp-files
file.upload.allowed-extensions=pdf,mp3,wav,mp4,mpeg,txt
file.upload.max-files-per-request=5

# ========================================
# Chunking Configuration
# ========================================
chunking.size=500
chunking.overlap=50
chunking.similarity-threshold=0.7
chunking.min-chunk-size=100
chunking.max-chunks-per-document=1000

# ========================================
# RAG Configuration
# ========================================
rag.max-chunks-to-retrieve=5
rag.similarity-threshold=0.7
rag.context-max-length=4000
rag.enable-source-tracking=true

# ========================================
# Async Processing Configuration
# ========================================
async.core-pool-size=3
async.max-pool-size=10
async.queue-capacity=50
async.thread-name-prefix=async-
async.await-termination-seconds=30

# ========================================
# Server Configuration
# ========================================
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.servlet.context-path=/
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.connection-timeout=30000

# ========================================
# CORS Configuration
# ========================================
cors.allowed-origins=http://localhost:3000,http://localhost:3001
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ========================================
# Logging Configuration
# ========================================
# Console Logging
logging.level.root=INFO
logging.level.com.simhadri.aidocqa=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.apache.pdfbox=WARN

# Pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %highlight(%-5level) - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File Logging
logging.file.name=logs/application.log
logging.file.path=./logs
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ========================================
# Actuator Configuration
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.metrics.export.simple.enabled=true

# ========================================
# Spring Doc / OpenAPI (Optional)
# ========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false

# ========================================
# Performance Tuning
# ========================================
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# ========================================
# Security (Basic for development)
# ========================================
# Disable security for development (enable later if needed)
spring.security.enabled=false
management.security.enabled=false

# ========================================
# Cache Configuration
# ========================================
spring.cache.type=simple
spring.cache.cache-names=embeddings,documents,chunks
spring.cache.simple.expiration=3600000

# ========================================
# Health Check Configuration
# ========================================
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.ping.enabled=true

# ========================================
# Error Handling
# ========================================
server.error.path=/error
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ========================================
# Transcription Configuration (Whisper)
# ========================================
whisper.model=whisper-1
whisper.language=en
whisper.response-format=json
whisper.temperature=0


# Groq API Configuration
groq.api.key=${GROQ_API_KEY:}groq.model=llama-3.3-70b-versatile
groq.temperature=0.7
groq.max-tokens=1000

# ========================================
# Application Specific
# ========================================
app.name=AI Document Q&A System
app.version=1.0.0
app.environment=development
app.debug=true